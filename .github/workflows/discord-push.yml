name: Discord Push Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Test secret exists
        shell: bash
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "FEHLER: DISCORD_WEBHOOK_URL Secret fehlt"
            exit 1
          fi
          echo "Secret ist gesetzt"

      - name: Send simple Discord message
        shell: bash
        run: |
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{"content":"Test aus GitHub Actions"}' \
            "${{ secrets.DISCORD_WEBHOOK_URL }}")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat response.txt

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "FEHLER: Discord hat keinen Erfolgscode zurückgegeben"
            exit 1
          fi