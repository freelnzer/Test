name: Discord Push Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send push info to Discord
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="(keine Beschreibung)"
          fi

          SUMMARY=$(echo "$COMMIT_MESSAGE" | head -n 1)
          DESCRIPTION=$(echo "$COMMIT_MESSAGE" | tail -n +2 | sed '/^[[:space:]]*$/d' | head -n 1)

          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="(keine Beschreibung)"
          fi

          SHORT_HASH=$(echo "$COMMIT_URL" | rev | cut -c1-7 | rev)
          export SUMMARY DESCRIPTION SHORT_HASH

          echo "import json, os" > /tmp/build_payload.py
          echo "embed = {" >> /tmp/build_payload.py
          echo "    'color': 5814783," >> /tmp/build_payload.py
          echo "    'author': {'name': 'Push von ' + os.environ['PUSHER'], 'icon_url': 'https://github.com/' + os.environ['PUSHER'] + '.png?size=32'}," >> /tmp/build_payload.py
          echo "    'fields': [" >> /tmp/build_payload.py
          echo "        {'name': 'Commit', 'value': '[' + os.environ['SHORT_HASH'] + '](' + os.environ['COMMIT_URL'] + ')', 'inline': True}," >> /tmp/build_payload.py
          echo "        {'name': 'Branch', 'value': '\`' + os.environ['BRANCH'] + '\`', 'inline': True}," >> /tmp/build_payload.py
          echo "        {'name': 'Summary', 'value': os.environ['SUMMARY'], 'inline': False}," >> /tmp/build_payload.py
          echo "        {'name': 'Description', 'value': os.environ['DESCRIPTION'], 'inline': False}" >> /tmp/build_payload.py
          echo "    ]" >> /tmp/build_payload.py
          echo "}" >> /tmp/build_payload.py
          echo "print(json.dumps({'embeds': [embed]}))" >> /tmp/build_payload.py

          JSON=$(python3 /tmp/build_payload.py)

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$JSON" \
            "$DISCORD_WEBHOOK_URL")

          echo "HTTP Status: $RESPONSE"
          cat response.txt

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            exit 1
          fi