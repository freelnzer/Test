name: Discord Push Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Geänderte Dateien sammeln
        id: changed_files
        shell: bash
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | head -20)
          if [ -z "$FILES" ]; then
            FILES="Keine Dateien erkannt"
          fi

          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Discord-Nachricht senden
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          PUSH_URL: ${{ github.event.compare }}
          FILES: ${{ steps.changed_files.outputs.files }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK_URL"]
          branch = os.environ["BRANCH"]
          commit_message = os.environ["COMMIT_MESSAGE"]
          push_url = os.environ["PUSH_URL"]
          files = os.environ["FILES"]

          content = (
              "🚀 Neuer Push\n\n"
              f"Branch: {branch}\n"
              f"Commit: {commit_message}\n"
              f"URL: {push_url}\n\n"
              f"Geänderte Dateien:\n{files}"
          )

          data = json.dumps({"content": content}).encode("utf-8")
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(req).read()
          PY