name: Discord Push Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send push info to Discord
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="(keine Beschreibung)"
          fi
          SUMMARY=$(echo "$COMMIT_MESSAGE" | head -n 1)
          DESCRIPTION=$(echo "$COMMIT_MESSAGE" | tail -n +2 | sed '/^[[:space:]]*$/d' | head -n 1)
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="(keine Beschreibung)"
          fi
          export PUSHER BRANCH COMMIT_URL SUMMARY DESCRIPTION
          JSON=$(python3 -c '
import json, os
embed = {
  "color": 5814783,
  "author": {
    "name": "Push von " + os.environ["PUSHER"],
    "icon_url": "https://github.com/" + os.environ["PUSHER"] + ".png?size=32"
  },
  "fields": [
    {"name": "Commit", "value": "[" + os.environ["COMMIT_URL"].split("/")[-1][:7] + "](" + os.environ["COMMIT_URL"] + ")", "inline": True},
    {"name": "Branch", "value": "`" + os.environ["BRANCH"] + "`", "inline": True},
    {"name": "Summary", "value": os.environ["SUMMARY"], "inline": False},
    {"name": "Description", "value": os.environ["DESCRIPTION"], "inline": False}
  ]
}
print(json.dumps({"embeds": [embed]}))
')
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$JSON" \
            "$DISCORD_WEBHOOK_URL")
          echo "HTTP Status: $RESPONSE"
          cat response.txt
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            exit 1
          fi