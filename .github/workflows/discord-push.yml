name: Discord Push Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send push info to Discord
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.event.head_commit.message }}
          PUSH_URL: ${{ github.event.compare }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="🚀 Neuer Push | Branch: ${BRANCH} | Commit: ${COMMIT} | URL: ${PUSH_URL}"
          export MESSAGE

          ESCAPED_MESSAGE=$(python3 -c 'import json,os; print(json.dumps(os.environ["MESSAGE"]))')

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":${ESCAPED_MESSAGE}}" \
            "$DISCORD_WEBHOOK_URL")

          echo "HTTP Status: $RESPONSE"
          cat response.txt

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            exit 1
          fi