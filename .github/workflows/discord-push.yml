name: Discord Notification

on:
  push:
    branches:
      - main

jobs:
  discord-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Embed to Discord
        uses: tsickert/discord-webhook@v4
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embeds: |
            [{
              "title": "Code Push",
              "description": "Ein neuer Push wurde auf ${{ github.repository }} registriert.",
              "color": 65280,
              "fields": [
                {
                  "name": "Committer",
                  "value": "${{ github.actor }}",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                }
              ]
            }]
